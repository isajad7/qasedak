{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ store.name|default:"VPN Store" }}{% endblock %}</title>
    <link href="{% static 'css/output.css' %}?v={{ static_version }}" rel="stylesheet">
    <link href="{% static 'css/vazirmatn.css' %}?v={{ static_version }}" rel="stylesheet">
    <style>
        :root { color-scheme: light; }
        body { font-family: 'Vazirmatn', sans-serif; }
        .site-bg { background: linear-gradient(180deg, #ffffff 0%, #f8fafc 54%, #eff6ff 100%); }
        body.site-bg { color: #475569; }
        body.site-bg ::selection { background: #bae6fd; color: #0f172a; }
        body.site-bg header,
        body.site-bg footer,
        body.site-bg nav[aria-label="ناوبری پایین موبایل"] {
            background: rgba(255, 255, 255, 0.92) !important;
            border-color: #e2e8f0 !important;
            box-shadow: 0 12px 34px rgba(15, 23, 42, 0.08);
        }
        body.site-bg nav[aria-label="ناوبری اصلی"] {
            background: #f8fafc !important;
            border-color: #e2e8f0 !important;
            color: #475569 !important;
        }
        body.site-bg [class~="border-white/10"] { border-color: #e2e8f0 !important; }
        body.site-bg [class~="bg-white/5"],
        body.site-bg [class~="bg-white/10"],
        body.site-bg [class~="bg-white/[0.03]"],
        body.site-bg [class~="bg-white/[0.035]"],
        body.site-bg [class~="bg-white/[0.04]"],
        body.site-bg [class~="bg-white/[0.045]"],
        body.site-bg [class~="bg-white/[0.05]"],
        body.site-bg [class~="bg-white/[0.055]"],
        body.site-bg [class~="bg-white/[0.07]"],
        body.site-bg [class~="bg-slate-900/60"],
        body.site-bg [class~="bg-slate-900/70"],
        body.site-bg [class~="bg-slate-950/20"],
        body.site-bg [class~="bg-slate-950/25"],
        body.site-bg [class~="bg-slate-950/30"],
        body.site-bg [class~="bg-slate-950/35"],
        body.site-bg [class~="bg-slate-950/40"],
        body.site-bg [class~="bg-slate-950/45"],
        body.site-bg [class~="bg-slate-950/50"],
        body.site-bg [class~="bg-slate-950/70"],
        body.site-bg [class~="bg-[#0b1220]/90"],
        body.site-bg [class~="bg-[#08101f]/95"],
        body.site-bg [class~="bg-[#060b16]/80"] {
            background-color: rgba(255, 255, 255, 0.9) !important;
        }
        body.site-bg .text-white,
        body.site-bg .text-slate-200 { color: #0f172a !important; }
        body.site-bg .text-slate-300 { color: #334155 !important; }
        body.site-bg .text-slate-400 { color: #475569 !important; }
        body.site-bg .text-slate-500,
        body.site-bg .text-slate-600 { color: #64748b !important; }
        body.site-bg .text-sky-100,
        body.site-bg .text-sky-200,
        body.site-bg .text-sky-300,
        body.site-bg [class~="text-sky-100/70"],
        body.site-bg [class~="text-sky-50/60"],
        body.site-bg [class~="text-sky-50/75"] { color: #0369a1 !important; }
        body.site-bg .text-emerald-100,
        body.site-bg .text-emerald-200,
        body.site-bg .text-emerald-300,
        body.site-bg [class~="text-emerald-100/70"],
        body.site-bg [class~="text-emerald-100/80"],
        body.site-bg [class~="text-emerald-100/85"],
        body.site-bg [class~="text-emerald-50/55"],
        body.site-bg [class~="text-emerald-50/65"],
        body.site-bg [class~="text-emerald-50/70"],
        body.site-bg [class~="text-emerald-50/75"],
        body.site-bg [class~="text-emerald-50/80"] { color: #047857 !important; }
        body.site-bg [class~="text-amber-50/80"] { color: #92400e !important; }
        body.site-bg [class~="text-fuchsia-50/80"] { color: #a21caf !important; }
        body.site-bg [class~="text-red-50/80"] { color: #b91c1c !important; }
        body.site-bg .bg-indigo-600.text-white,
        body.site-bg .bg-indigo-500.text-white { color: #ffffff !important; }
        body.site-bg input:not([type="range"]):not([type="radio"]):not([type="checkbox"]),
        body.site-bg textarea,
        body.site-bg select {
            background: #ffffff !important;
            border-color: #cbd5e1 !important;
            color: #0f172a !important;
        }
        body.site-bg input::placeholder,
        body.site-bg textarea::placeholder { color: #94a3b8 !important; }
        body.site-bg input[type="range"] {
            appearance: none;
            -webkit-appearance: none;
            height: 0.5rem;
            border-radius: 999px;
            background: #dbeafe !important;
            border: 0 !important;
        }
        body.site-bg input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            -webkit-appearance: none;
            width: 1rem;
            height: 1rem;
            border: 3px solid #ffffff;
            border-radius: 999px;
            background: #0ea5e9;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.35);
        }
        body.site-bg input[type="range"]::-moz-range-track {
            height: 0.5rem;
            border-radius: 999px;
            background: #dbeafe;
        }
        body.site-bg input[type="range"]::-moz-range-thumb {
            width: 1rem;
            height: 1rem;
            border: 3px solid #ffffff;
            border-radius: 999px;
            background: #0ea5e9;
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.35);
        }
        .plan-shelf {
            position: relative;
            margin-block: 1.25rem;
            overflow: hidden;
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 1.5rem;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(248, 250, 252, 0.68)),
                rgba(255, 255, 255, 0.74);
            padding: 0.75rem 0;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.9),
                0 18px 48px rgba(15, 23, 42, 0.07);
            backdrop-filter: blur(22px);
        }
        .plan-scroll-label {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            white-space: nowrap;
            border: 1px solid rgba(125, 211, 252, 0.5);
            border-radius: 999px;
            background: rgba(240, 249, 255, 0.92);
            padding: 0.35rem 0.75rem;
            font-size: 0.68rem;
            font-weight: 900;
            color: #0369a1;
            box-shadow: 0 10px 24px rgba(14, 165, 233, 0.14);
        }
        .plan-scroll-label__arrows {
            display: inline-flex;
            font-size: 0.95rem;
            line-height: 1;
            animation: planHintSlide 1.15s ease-in-out infinite;
        }
        .plan-shelf::before,
        .plan-shelf::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            z-index: 5;
            width: 3rem;
            pointer-events: none;
        }
        .plan-shelf::before {
            left: 0;
            background: linear-gradient(90deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0));
        }
        .plan-shelf::after {
            right: 0;
            background: linear-gradient(270deg, rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0));
        }
        .plan-scroll {
            display: block;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-padding-inline: clamp(1rem, 12vw, 5rem);
            scrollbar-width: thin;
            scrollbar-color: #bae6fd transparent;
            -webkit-overflow-scrolling: touch;
        }
        .plan-scroll::-webkit-scrollbar {
            width: 0.45rem;
            height: 0.45rem;
        }
        .plan-scroll::-webkit-scrollbar-thumb {
            border-radius: 999px;
            background: #bae6fd;
        }
        .plan-scroll::-webkit-scrollbar-track { background: transparent; }
        .plan-track {
            display: flex;
            min-width: max-content;
            align-items: stretch;
            gap: 0.875rem;
            padding-block: 0.75rem;
            padding-inline: max(1rem, calc((100% - 19rem) / 2));
        }
        .plan-card {
            display: flex;
            flex: 0 0 auto;
            flex-direction: column;
            justify-content: space-between;
            inline-size: min(19rem, calc(100vw - 5.5rem));
            min-block-size: 12rem;
            scroll-snap-align: center;
        }
        .plan-card[aria-pressed="true"] {
            transform: translateY(-2px);
            box-shadow: 0 20px 44px rgba(14, 165, 233, 0.16);
        }
        .plan-card:focus-visible {
            outline: 3px solid rgba(14, 165, 233, 0.24);
            outline-offset: 3px;
        }
        .plan-scroll-button {
            position: absolute;
            top: 50%;
            z-index: 9;
            display: inline-flex;
            width: 2.65rem;
            height: 2.65rem;
            transform: translateY(-50%);
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(125, 211, 252, 0.65);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.92);
            color: #0369a1;
            font-size: 1.7rem;
            font-weight: 900;
            line-height: 1;
            box-shadow: 0 16px 34px rgba(14, 165, 233, 0.2);
            transition: opacity 160ms ease, transform 160ms ease, background 160ms ease;
        }
        .plan-scroll-button:hover {
            background: #e0f2fe;
            transform: translateY(-50%) scale(1.04);
        }
        .plan-scroll-button:focus-visible {
            outline: 3px solid rgba(14, 165, 233, 0.22);
            outline-offset: 3px;
        }
        .plan-scroll-button[hidden] {
            display: none;
        }
        .plan-scroll-button--prev {
            left: 0.7rem;
        }
        .plan-scroll-button--next {
            right: 0.7rem;
            animation: planArrowPulse 1.35s ease-in-out infinite;
        }
        .plan-scroll-hint {
            position: absolute;
            right: 50%;
            bottom: 0.8rem;
            z-index: 8;
            display: inline-flex;
            transform: translateX(50%);
            align-items: center;
            gap: 0.45rem;
            border: 1px solid rgba(125, 211, 252, 0.55);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.94);
            padding: 0.45rem 0.8rem;
            color: #0369a1;
            font-size: 0.7rem;
            font-weight: 900;
            box-shadow: 0 14px 34px rgba(14, 165, 233, 0.18);
            pointer-events: none;
        }
        .plan-scroll-hint[hidden] {
            display: none;
        }
        .plan-scroll-hint__arrows {
            display: inline-flex;
            font-size: 1rem;
            line-height: 1;
            animation: planHintSlide 1.15s ease-in-out infinite;
        }
        .plan-scroll-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            margin-top: 0.85rem;
        }
        .plan-nav-button {
            display: inline-flex;
            width: 2.5rem;
            height: 2.5rem;
            flex: 0 0 auto;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(125, 211, 252, 0.52);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.9);
            color: #0369a1;
            font-size: 1.5rem;
            font-weight: 900;
            line-height: 1;
            box-shadow: 0 12px 26px rgba(14, 165, 233, 0.12);
            transition: opacity 160ms ease, transform 160ms ease, background 160ms ease;
        }
        .plan-nav-button:hover {
            background: #e0f2fe;
            transform: translateY(-1px);
        }
        .plan-nav-button[disabled] {
            cursor: not-allowed;
            opacity: 0.35;
            transform: none;
        }
        .plan-progress {
            display: flex;
            min-width: 0;
            flex: 1 1 auto;
            align-items: center;
            justify-content: center;
            gap: 0.7rem;
            border: 1px solid rgba(226, 232, 240, 0.9);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.72);
            padding: 0.55rem 0.7rem;
        }
        .plan-progress__count {
            white-space: nowrap;
            font-size: 0.72rem;
            font-weight: 900;
            color: #64748b;
        }
        .plan-dots {
            display: flex;
            min-width: 0;
            align-items: center;
            justify-content: center;
            gap: 0.35rem;
        }
        .plan-dot {
            width: 0.42rem;
            height: 0.42rem;
            flex: 0 0 auto;
            border: 0;
            border-radius: 999px;
            background: #cbd5e1;
            padding: 0;
            transition: width 160ms ease, background 160ms ease, box-shadow 160ms ease;
        }
        .plan-dot[aria-current="true"] {
            width: 1.35rem;
            background: #0ea5e9;
            box-shadow: 0 6px 16px rgba(14, 165, 233, 0.24);
        }
        @keyframes planHintSlide {
            0%,
            100% {
                transform: translateX(0);
            }
            50% {
                transform: translateX(-0.32rem);
            }
        }
        @keyframes planArrowPulse {
            0%,
            100% {
                box-shadow: 0 16px 34px rgba(14, 165, 233, 0.2);
            }
            50% {
                box-shadow: 0 16px 34px rgba(14, 165, 233, 0.34), 0 0 0 0.45rem rgba(14, 165, 233, 0.08);
            }
        }
        @media (prefers-reduced-motion: reduce) {
            .plan-scroll-label__arrows,
            .plan-scroll-hint__arrows,
            .plan-scroll-button--next {
                animation: none;
            }
        }
        #buy {
            display: flex;
            min-width: 0;
            flex-direction: column;
            gap: 1rem;
        }
        #plans,
        #checkout {
            min-width: 0;
        }
        @media (min-width: 1024px) {
            #buy {
                min-height: calc(100vh - 9rem);
                flex-direction: row-reverse;
                align-items: stretch;
            }
            #plans,
            #checkout {
                flex: 1 1 0;
                height: calc(100vh - 9rem);
            }
            #checkout {
                overflow-y: auto;
            }
        }
        .dashboard-pass {
            position: relative;
            overflow: hidden;
            transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
        }
        .dashboard-pass::before {
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(120deg, rgba(14, 165, 233, 0.08), rgba(255, 255, 255, 0), rgba(16, 185, 129, 0.08));
            opacity: 0;
            transition: opacity 180ms ease;
        }
        .dashboard-pass:hover {
            transform: translateY(-2px);
            border-color: rgba(125, 211, 252, 0.6) !important;
            box-shadow: 0 22px 48px rgba(15, 23, 42, 0.1);
        }
        .dashboard-pass:hover::before { opacity: 1; }
        .access-battery {
            position: relative;
            width: 2.35rem;
            height: 4.75rem;
            overflow: visible;
            border: 1px solid #cbd5e1;
            border-radius: 0.85rem;
            background: linear-gradient(180deg, #ffffff, #f8fafc);
            padding: 0.22rem;
            display: flex;
            align-items: flex-end;
            box-shadow: inset 0 1px 1px rgba(15, 23, 42, 0.05);
        }
        .access-battery::after {
            content: "";
            position: absolute;
            top: -0.36rem;
            left: 50%;
            width: 0.92rem;
            height: 0.3rem;
            transform: translateX(-50%);
            border-radius: 0.22rem 0.22rem 0 0;
            background: #cbd5e1;
        }
        .access-battery-fill {
            width: 100%;
            min-height: 0.35rem;
            border-radius: 0.58rem;
            transition: height 520ms cubic-bezier(.22, 1, .36, 1), background 180ms ease;
        }
        .access-battery-fill.is-good {
            background: linear-gradient(0deg, #22c55e, #38bdf8);
        }
        .access-battery-fill.is-mid {
            background: linear-gradient(0deg, #f59e0b, #38bdf8);
        }
        .access-battery-fill.is-low {
            background: linear-gradient(0deg, #ef4444, #f59e0b);
        }
        .sweet-notify-backdrop {
            position: fixed;
            inset: 0;
            z-index: 90;
            display: grid;
            place-items: center;
            padding: 1rem;
            background: rgba(15, 23, 42, 0.18);
            backdrop-filter: blur(14px);
            animation: sweet-backdrop-in 180ms ease both;
        }
        .sweet-notify {
            width: min(100%, 26rem);
            border: 1px solid rgba(226, 232, 240, 0.95);
            border-radius: 1.35rem;
            background: rgba(255, 255, 255, 0.96);
            padding: 1.25rem;
            text-align: center;
            box-shadow: 0 28px 80px rgba(15, 23, 42, 0.18);
            animation: sweet-card-in 220ms cubic-bezier(.22, 1, .36, 1) both;
        }
        .sweet-notify-icon {
            display: grid;
            width: 3.25rem;
            height: 3.25rem;
            margin: 0 auto 0.85rem;
            place-items: center;
            border-radius: 999px;
            background: #e0f2fe;
            color: #0284c7;
            box-shadow: inset 0 0 0 1px rgba(125, 211, 252, 0.75);
        }
        .sweet-notify-title {
            color: #0f172a;
            font-size: 1.05rem;
            font-weight: 900;
        }
        .sweet-notify-text {
            margin-top: 0.65rem;
            color: #475569;
            font-size: 0.9rem;
            font-weight: 700;
            line-height: 1.9;
        }
        .sweet-notify-action {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 7rem;
            margin-top: 1rem;
            border-radius: 999px;
            background: #0ea5e9;
            color: #020617;
            padding: 0.72rem 1.25rem;
            font-size: 0.85rem;
            font-weight: 900;
            transition: transform 160ms ease, background 160ms ease;
        }
        .sweet-notify-action:hover {
            transform: translateY(-1px);
            background: #38bdf8;
        }
        @keyframes sweet-backdrop-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes sweet-card-in {
            from { opacity: 0; transform: translateY(10px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .copy-toast {
            position: fixed;
            left: 50%;
            bottom: 5.5rem;
            z-index: 80;
            min-width: 11rem;
            transform: translate(-50%, 16px) scale(0.96);
            border: 1px solid rgba(110, 231, 183, 0.35);
            border-radius: 1rem;
            background: rgba(6, 78, 59, 0.96);
            color: #ecfdf5;
            opacity: 0;
            padding: 0.75rem 1rem;
            pointer-events: none;
            text-align: center;
            box-shadow: 0 18px 60px rgba(16, 185, 129, 0.28), 0 12px 40px rgba(0, 0, 0, 0.35);
            transition: opacity 180ms ease, transform 180ms ease;
        }
        .copy-toast.is-visible {
            opacity: 1;
            transform: translate(-50%, 0) scale(1);
        }
        .copy-card-pulse {
            animation: copy-card-pulse 700ms ease;
        }
        .copy-button-copied {
            animation: copy-button-copied 520ms ease;
        }
        @keyframes copy-card-pulse {
            0% { box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
            35% { box-shadow: 0 0 0 6px rgba(52, 211, 153, 0.18); }
            100% { box-shadow: 0 0 0 14px rgba(52, 211, 153, 0); }
        }
        @keyframes copy-button-copied {
            0% { transform: scale(1); }
            45% { transform: scale(0.98); }
            100% { transform: scale(1); }
        }
        @media (min-width: 640px) {
            .copy-toast { bottom: 2rem; }
        }
    </style>
</head>
<body class="site-bg text-slate-300 min-h-screen overflow-x-hidden">
    <div dir="rtl" class="flex min-h-screen flex-col">
    {% include 'includes/header.html' %}

    <main id="page-content" class="z-10 mx-auto w-full max-w-6xl flex-grow px-4 pb-28 pt-6 sm:px-6 sm:pb-10 sm:pt-8">
        {% if messages %}
            <div class="pointer-events-none fixed inset-x-0 top-20 z-[60] mx-auto w-full max-w-md px-4">
                <div class="space-y-2">
                    {% for message in messages %}
                        <div class="pointer-events-auto rounded-2xl border px-4 py-3 text-sm font-bold shadow-[0_18px_50px_rgba(0,0,0,0.25)] backdrop-blur-xl {% if message.tags == 'error' %}border-red-400/20 bg-red-400/15 text-red-100{% else %}border-emerald-400/20 bg-emerald-400/15 text-emerald-100{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    {% include 'includes/footer.html' %}
    </div>
    <script>
        function copyTextToClipboard(value) {
            if (navigator.clipboard && window.isSecureContext) {
                return navigator.clipboard.writeText(value);
            }

            return new Promise((resolve, reject) => {
                const textarea = document.createElement("textarea");
                textarea.value = value;
                textarea.setAttribute("readonly", "");
                textarea.style.position = "fixed";
                textarea.style.top = "-9999px";
                textarea.style.opacity = "0";
                document.body.appendChild(textarea);
                textarea.select();
                textarea.setSelectionRange(0, textarea.value.length);

                try {
                    if (document.execCommand("copy")) {
                        resolve();
                    } else {
                        reject(new Error("Copy command failed."));
                    }
                } catch (error) {
                    reject(error);
                } finally {
                    document.body.removeChild(textarea);
                }
            });
        }

        let copyToastTimer;

        function showCopyToast(message) {
            let toast = document.querySelector("[data-copy-toast]");
            if (!toast) {
                toast = document.createElement("div");
                toast.className = "copy-toast text-sm font-black";
                toast.setAttribute("data-copy-toast", "");
                document.body.appendChild(toast);
            }

            toast.textContent = message || "کپی شد";
            toast.classList.add("is-visible");
            window.clearTimeout(copyToastTimer);
            copyToastTimer = window.setTimeout(() => {
                toast.classList.remove("is-visible");
            }, 1800);
        }

        document.addEventListener("click", function (event) {
            const link = event.target.closest("[data-copy-access-link]");
            if (!link) return;
            event.preventDefault();

            const value = link.dataset.copyValue || link.getAttribute("href") || "";
            if (!value) return;

            const wrapper = link.closest("[data-copy-scope]") || link.closest(".space-y-3") || document;
            const status = wrapper.querySelector("[data-copy-status]");
            const previousText = status ? status.textContent : "";
            const previousClassName = status ? status.className : "";
            const buttonText = link.querySelector("[data-copy-button-text]");
            const originalButtonText = buttonText ? (link.dataset.copyOriginalText || buttonText.textContent) : "";
            if (buttonText && !link.dataset.copyOriginalText) {
                link.dataset.copyOriginalText = originalButtonText;
            }

            copyTextToClipboard(value).then(() => {
                showCopyToast(link.dataset.copySuccess || "کپی شد");
                wrapper.classList.add("copy-card-pulse");
                link.classList.add("copy-button-copied");
                if (buttonText) {
                    buttonText.textContent = "کپی شد";
                }
                if (status) {
                    status.textContent = "کپی شد";
                    status.className = previousClassName;
                    status.classList.remove("text-slate-500", "text-slate-400", "text-emerald-100", "text-emerald-200", "text-emerald-300", "text-sky-100", "text-red-300");
                    status.classList.add("text-emerald-300");
                }
                window.setTimeout(() => {
                    wrapper.classList.remove("copy-card-pulse");
                    link.classList.remove("copy-button-copied");
                    if (buttonText) {
                        buttonText.textContent = link.dataset.copyOriginalText || originalButtonText;
                    }
                    if (status) {
                        status.textContent = previousText || "آماده کپی";
                        status.className = previousClassName;
                    }
                }, 1600);
            }).catch(() => {
                showCopyToast("کپی نشد");
                if (status) {
                    status.textContent = "کپی نشد";
                    status.className = previousClassName;
                    status.classList.remove("text-slate-500", "text-slate-400", "text-emerald-100", "text-emerald-200", "text-emerald-300", "text-sky-100", "text-red-300");
                    status.classList.add("text-red-300");
                }
                window.setTimeout(() => {
                    if (status) {
                        status.textContent = previousText || "آماده کپی";
                        status.className = previousClassName;
                    }
                }, 1600);
            });
        });
    </script>
</body>
</html>
